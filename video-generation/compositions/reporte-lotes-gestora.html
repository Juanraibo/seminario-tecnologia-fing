<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .container {
        width: 100%;
        height: 100%;
        padding: 80px;
        color: white;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 60px;
      }
      .title {
        font-size: 72px;
        font-weight: 700;
      }
      .date {
        font-size: 36px;
        opacity: 0.8;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        margin-bottom: 60px;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
      }
      .stat-number {
        font-size: 96px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .stat-label {
        font-size: 32px;
        opacity: 0.9;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .lotes-list {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 40px;
      }
      .lote-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 30px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        margin-bottom: 20px;
      }
      .lote-codigo {
        font-size: 42px;
        font-weight: 600;
      }
      .lote-categoria {
        font-size: 32px;
        opacity: 0.8;
      }
      .lote-peso {
        font-size: 38px;
        font-weight: 700;
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="reporte-lotes"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >

      <div class="container">
        <!-- Header -->
        <div class="header clip" data-start="0" data-duration="15" data-track-index="1">
          <div id="title" class="title">Lotes Disponibles</div>
          <div id="date" class="date">{{FECHA_ACTUAL}}</div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid clip" data-start="0.5" data-duration="14.5" data-track-index="2">
          <div id="stat-1" class="stat-card">
            <div class="stat-number">{{TOTAL_LOTES}}</div>
            <div class="stat-label">Lotes Disponibles</div>
          </div>

          <div id="stat-2" class="stat-card">
            <div class="stat-number">{{PESO_TOTAL}}</div>
            <div class="stat-label">Kg Totales</div>
          </div>

          <div id="stat-3" class="stat-card">
            <div class="stat-number">{{CATEGORIAS}}</div>
            <div class="stat-label">Categorías</div>
          </div>
        </div>

        <!-- Lotes List -->
        <div class="lotes-list clip" data-start="1" data-duration="14" data-track-index="3">
          <div id="lote-1" class="lote-item">
            <div>
              <div class="lote-codigo">LOTE-001</div>
              <div class="lote-categoria">Computadoras y periféricos</div>
            </div>
            <div class="lote-peso">450 kg</div>
          </div>

          <div id="lote-2" class="lote-item">
            <div>
              <div class="lote-codigo">LOTE-002</div>
              <div class="lote-categoria">Monitores y pantallas</div>
            </div>
            <div class="lote-peso">320 kg</div>
          </div>

          <div id="lote-3" class="lote-item">
            <div>
              <div class="lote-codigo">LOTE-003</div>
              <div class="lote-categoria">Equipos de red</div>
            </div>
            <div class="lote-peso">180 kg</div>
          </div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#title", { opacity: 0, x: -100, duration: 0.8 }, 0)
        .from("#date", { opacity: 0, x: 100, duration: 0.8 }, 0)
        .from(".stat-card", {
          opacity: 0,
          y: 100,
          stagger: 0.2,
          duration: 0.8,
          ease: "back.out(1.2)"
        }, 0.5)
        .from(".stat-number", {
          textContent: 0,
          duration: 1.5,
          ease: "power2.out",
          snap: { textContent: 1 }
        }, 1)
        .from(".lote-item", {
          opacity: 0,
          x: -100,
          stagger: 0.3,
          duration: 0.6
        }, 1);

      window.__timelines["reporte-lotes"] = tl;
    </script>
  </body>
</html>
